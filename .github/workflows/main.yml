name: News Monitor Bot

on:
  repository_dispatch:
    types: [run_monitor]
  workflow_dispatch: # 수동으로 버튼 눌러 실행할 때 필요

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4 # 여기를 수정했습니다.
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 google-generativeai

      - name: Run Script
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
          DISCORD_URL: ${{ secrets.DISCORD_URL }}
        run: cloud_bot.py # 실제 파일명으로 되어 있는지 확인!
