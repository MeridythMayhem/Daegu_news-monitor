name: News Monitor Bot

on:
  # 외부에서 신호를 줄 때 실행됨
  repository_dispatch:
    types: [run_monitor]
  # (선택) 수동 실행 가능하게 유지
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: ambassadors/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 google-generativeai

      - name: Run Script
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
          DISCORD_URL: ${{ secrets.DISCORD_URL }}
        run: python your_script_name.py
