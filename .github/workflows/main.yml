name: News Monitor Bot

on:
  repository_dispatch:
    types: [run_monitor]
  workflow_dispatch:

# 동시 실행 방지 (이전 실행 완료 후 다음 실행)
concurrency:
  group: news-monitor
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run Script
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
          DISCORD_URL: ${{ secrets.DISCORD_URL }}
        run: python cloud_bot.py

      - name: 봇 기억(히스토리) 저장하기
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add news_history.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 봇 기억력 업데이트 (news_history.json)"
          git push

